name: Build Taskbar-Lyrics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Verify solution file exists
      run: |
        dir
        echo "Current directory: $PWD"
        if (-not (Test-Path "Taskbar Lyrics.sln")) {
          Write-Error "Solution file not found!"
          exit 1
        }
      
    - name: Install Visual Studio C++ Build Tools
      run: |
        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile "vs_buildtools.exe"
        Start-Process -FilePath "vs_buildtools.exe" -ArgumentList "--quiet --wait --norestart --nocache --installPath C:\BuildTools --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows11SDK.22000" -Wait
        echo "C:\BuildTools\MSBuild\Current\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
    - name: Install vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git --depth 1
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg integrate install
      
    - name: Install dependencies
      run: |
        .\vcpkg\vcpkg install cpp-httplib:x86-windows nlohmann-json:x86-windows
      
    - name: Build project
      run: |
        msbuild "Taskbar Lyrics.sln" /p:Configuration=Release /p:Platform=x86 /p:VcpkgEnabled=true /p:VcpkgTriplet=x86-windows
      
    - name: Verify build output
      run: |
        dir bin\Release
        if (-not (Test-Path "bin\Release\taskbar-lyrics.dll")) {
          Write-Error "Build failed: DLL not found!"
          exit 1
        }
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskbar-lyrics
        path: bin\Release\taskbar-lyrics.dll
