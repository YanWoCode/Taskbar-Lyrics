name: Build Taskbar-Lyrics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发编译

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Install Visual Studio Build Tools
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86
        toolset: 14.3
        
    - name: Install vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git --depth 1
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg integrate install
        
    - name: Install dependencies
      run: |
        .\vcpkg\vcpkg install cpp-httplib:x86-windows nlohmann-json:x86-windows
        
    - name: Build project
      run: |
        msbuild "Taskbar Lyrics.sln" /p:Configuration=Release /p:Platform=x86 /p:VcpkgEnabled=true
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskbar-lyrics
        path: bin/Release/taskbar-lyrics.dll
