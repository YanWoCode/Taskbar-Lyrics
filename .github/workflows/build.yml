name: Build Taskbar-Lyrics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Visual Studio C++ Build Tools
      run: |
        $vswherePath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $installerPath = & $vswherePath -latest -products * -requires Microsoft.VisualStudio.Component.Windows11SDK.22000 -property installationPath
        if (-not $installerPath) {
          Write-Host "Installing Visual Studio Build Tools..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile "vs_buildtools.exe"
          Start-Process -FilePath "vs_buildtools.exe" -ArgumentList "--quiet --wait --norestart --nocache --installPath C:\BuildTools --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows11SDK.22000" -Wait
          $installerPath = "C:\BuildTools"
        }
        Write-Host "Visual Studio installed at: $installerPath"
        echo "VSINSTALLDIR=$installerPath" >> $env:GITHUB_ENV
        echo "PATH=$installerPath\MSBuild\Current\Bin;$env:PATH" >> $env:GITHUB_ENV
      
    - name: Install vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git --depth 1
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg integrate install
      
    - name: Install dependencies
      run: |
        .\vcpkg\vcpkg install cpp-httplib:x86-windows nlohmann-json:x86-windows
      
    - name: Build project
      run: |
        msbuild "Taskbar Lyrics.sln" /p:Configuration=Release /p:Platform=x86 /p:VcpkgEnabled=true /p:VcpkgTriplet=x86-windows
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskbar-lyrics
        path: bin/Release/taskbar-lyrics.dll
